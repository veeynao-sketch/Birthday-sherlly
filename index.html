<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romantic Birthday Celebration</title>
    <style>
       body {
           background: url('https://drive.google.com/uc?id=1-L1ukQXcrLv8bNKiPWwcsYQXlzCmLcoU') no-repeat center center fixed;
           background-size: cover;
       }
       .sakura {
           animation: fall 5s infinite;
       }
       @keyframes fall {
           from { transform: translateY(0); } 
           to { transform: translateY(100vh); } 
       }
    </style>
</head>
<body>
    <h1 style="text-align: center; color: white;">Happy Birthday!</h1>
    <div style="text-align: center;">
        <video controls>
            <source src="https://drive.google.com/uc?id=1q62-B0QzoMgehwol4jWjoTcuq8l2lcZY" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>
    <audio controls autoplay loop>
        <source src="https://drive.google.com/uc?id=1qSZk_pG6yts_t2BNOGvXvxk6u2HFPEvy">
        Your browser does not support the audio tag.
    </audio>
    <img src="https://drive.google.com/uc?id=1-L1ukQXcrLv8bNKiPWwcsYQXlzCmLcoU" alt="Birthday Photo 1" style="width: 300px; display: block; margin: auto;">
    <img src="https://drive.google.com/uc?id=1JDZHQec8d5OKmbRgKO43aRjePNeJVIgw" alt="Birthday Photo 2" style="width: 300px; display: block; margin: auto;">
    <audio controls>
        <source src="https://drive.google.com/uc?id=1pop9g59kMj5wtSnTcSjY6KJddVk3UEoS">

    </audio>
    <div class="sakura"></div>

</html>
